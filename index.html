<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pregunta</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9ecf, #ffc0cb);
        }

        .caja {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            color: #ff4d88;
        }

        #contenedor {
            position: relative;
            width: 300px;
            height: 200px;
            margin: auto;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        #si {
            position: absolute;
            left: 50px;
            top: 50px;
            background-color: #ff4d88;
            color: white;
        }

        #no {
            position: absolute;
            left: 150px;
            top: 50px;
            background-color: #4CAF50;
            color: white;
        }

        button:hover {
            transform: scale(1.1);
        }

        /* MODAL */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        #contenidoModal {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            max-width: 320px;
        }

        #contenidoModal img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        #cerrar {
            margin-top: 10px;
            background: #ff4d88;
            color: white;
        }
    </style>
</head>

<body>

    <div class="caja">
        <h1>¿Soy tonta?</h1>

        <div id="contenedor">
            <button id="si">Sí</button>
            <button id="no">No</button>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal">
        <div id="contenidoModal">
            <h2>Exacto 😌</h2>
            <p>Sos muy inteligente Helen</p>

            <!-- Imagen de internet -->
            <img src="https://i.shgcdn.com/0465384c-9563-417b-b638-517529f21c3c/-/format/auto/-/preview/3000x3000/-/quality/lighter/" alt="imagen">

            <br>
            <button id="cerrar">Cerrar</button>
        </div>
    </div>

    <script>
        const botonSi = document.getElementById("si");
        const botonNo = document.getElementById("no");
        const contenedor = document.getElementById("contenedor");

        const modal = document.getElementById("modal");
        const cerrar = document.getElementById("cerrar");

        function moverBoton() {
            const maxX = contenedor.clientWidth - botonSi.offsetWidth;
            const maxY = contenedor.clientHeight - botonSi.offsetHeight;

            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            botonSi.style.left = x + "px";
            botonSi.style.top = y + "px";
        }

        // Botón "Sí" huye
        botonSi.addEventListener("pointerenter", moverBoton);
        botonSi.addEventListener("pointerdown", moverBoton);

        // Botón "No" abre ventana con imagen
        botonNo.addEventListener("click", function () {
            modal.style.display = "flex";
        });

        // Cerrar modal
        cerrar.addEventListener("click", function () {
            modal.style.display = "none";
        });
    </script>

</body>
</html>
